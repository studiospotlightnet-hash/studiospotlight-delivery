<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a96e;--gold-l:#e8d5b0;--dark:#0c0c0b;--dark2:#141412;--dark3:#1c1c19;--muted:#5a5a52;--text:#e4e4dc;--text2:#9a9a8e}
html,body{margin:0;padding:0;overflow-x:hidden;overflow-y:auto;width:100%;background:var(--dark);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300}
/* Hero: фиксирана px височина — единственото което работи надеждно в Wix iframe */
.hero{position:relative;width:100%;height:620px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.32);transform:scale(1.03);transition:transform 8s ease}
.hero:hover .hero-bg{transform:scale(1)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,12,11,0.1) 0%,rgba(12,12,11,0) 30%,rgba(12,12,11,0.5) 75%,rgba(12,12,11,1) 100%)}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 32px;max-width:100%}
.studio-badge{font-size:.6rem;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:28px;opacity:.85}
.hero-title{font-family:'Montserrat',sans-serif;font-size:clamp(2.2rem,5vw,4.5rem);font-weight:300;font-style:italic;line-height:1.05;letter-spacing:.01em;margin-bottom:20px;color:var(--gold-l)}
.hero-date{font-size:.65rem;letter-spacing:.35em;color:var(--text2);text-transform:uppercase;margin-bottom:44px}
.hero-line{width:36px;height:1px;background:var(--gold);margin:0 auto 44px;opacity:.5}
.btn-play{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,169,110,0.4);color:var(--gold-l);background:rgba(201,169,110,0.06);padding:14px 40px;font-family:'Montserrat',sans-serif;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .3s}
.btn-play:hover{background:rgba(201,169,110,0.14);border-color:var(--gold)}
main{max-width:1000px;margin:0 auto;padding:80px 24px 100px;width:100%}
.sec-label{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:32px;display:flex;align-items:center;gap:16px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--dark3)}
.grid{display:grid;grid-template-columns:1fr;gap:20px;margin-bottom:60px}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.card{background:var(--dark2);border:1px solid #1e1e1a;border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .3s,transform .3s}
.card:hover{border-color:#333;transform:translateY(-3px)}
.card.active{border-color:var(--gold)}
.thumb{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover;filter:brightness(.6);transition:filter .3s}
.card:hover .thumb img,.card.active .thumb img{filter:brightness(.75)}
.play-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.play-ico svg{width:44px;height:44px;opacity:.8;transition:opacity .2s,transform .2s}
.card:hover .play-ico svg{opacity:1;transform:scale(1.1)}
.card-info{padding:16px 20px}
.card-lbl{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.card-name{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:300}
.player-section{margin-bottom:60px}
.player-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.np-lbl{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.np-title{font-family:'Montserrat',sans-serif;font-size:1rem;font-style:italic;color:var(--gold-l)}
.player-wrap{display:none;width:100%;border-radius:4px;overflow:hidden;background:#000}
.player-wrap.active{display:block}
.dl-row{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:28px 32px;background:var(--dark2);border:1px solid #1e1e1a;border-radius:4px;flex-wrap:wrap;margin-bottom:20px}
.dl-info h3{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:300;margin-bottom:4px}
.dl-info p{font-size:.75rem;color:var(--muted)}
.btn-dl{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#0c0c0b;text-decoration:none;padding:12px 26px;font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border-radius:2px;transition:background .2s,transform .2s;white-space:nowrap}
.btn-dl:hover{background:var(--gold-l);transform:translateY(-2px)}
.notice{padding:20px 24px;border-left:2px solid var(--gold);background:rgba(201,169,110,0.04);font-size:.78rem;color:var(--text2);line-height:1.8}
.notice strong{color:var(--gold-l);font-weight:400;display:block;margin-bottom:8px}
.notice ul{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px}
.notice ul li::before{content:'◆ ';color:var(--gold);font-size:.6rem}
.hl{color:var(--gold-l)}
footer{text-align:center;padding:40px 20px;border-top:1px solid #161614;font-size:.65rem;letter-spacing:.2em;color:var(--muted)}
footer a{color:var(--gold);text-decoration:none}
@media(max-width:480px){.dl-row{flex-direction:column;align-items:flex-start}main{padding:60px 16px 80px}}
</style>
</head>

// ── Изпращаме реалната височина на Wix за да оразмери iframe-а ──
function reportHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type:'wix-height', height: h }, '*');
  try { window.parent.postMessage(JSON.stringify({ height: h }), '*'); } catch(e){}
}
reportHeight();
window.addEventListener('load', reportHeight);
document.fonts && document.fonts.ready.then(reportHeight);

function selectVideo(idx) {
  document.querySelectorAll('.card').forEach(function(c,i){ c.classList.toggle('active',i===idx) })
  document.querySelectorAll('.player-wrap').forEach(function(p,i){
    var wasActive = p.classList.contains('active')
    p.classList.toggle('active',i===idx)
    if (wasActive && i!==idx) { var vid=p.querySelector('video'); if(vid) vid.pause() }
  })
  document.getElementById('nowTitle').textContent = VIDEOS[idx].label
  document.getElementById('dlDesc').textContent = VIDEOS[idx].label + ' · Пълна резолюция'
  document.getElementById('dlBtn').href = VIDEOS[idx].download || '#'
  scrollToPlayer()
  setTimeout(reportHeight, 400)
}
function scrollToPlayer() {
  document.getElementById('playerSection').scrollIntoView({behavior:'smooth',block:'start'})
}
</script>
